name: Sync upstream OpenSees

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          submodules: false

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/OpenSees/OpenSees.git
          git fetch upstream master

      - name: Create sync branch
        run: |
          git checkout -B sync/upstream-master master
          git merge --ff-only upstream/master

      - name: Push sync branch
        run: |
          git push origin sync/upstream-master --force

      - name: Open pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: sync/upstream-master
          base: master
          title: "Sync master with upstream OpenSees"
          body: "Automated PR to fast-forward SIMPSOBA master with upstream OpenSees master."