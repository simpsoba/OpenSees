name: Sync upstream OpenSees

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/OpenSees/OpenSees.git
          git fetch upstream master

      - name: Fast-forward master from upstream
        run: |
          git checkout master
          git merge --ff-only upstream/master
          git push origin master